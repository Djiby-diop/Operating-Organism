# OO Operating Organism — Boot Configuration
# Parsed by soma_boot.c on first boot
# Location on USB: \OO\config\oo.cfg

[boot]
model_path  = \OO\models\stories15M.q8_0.gguf
lora_path   = \OO\lora\adapter.bin
log_path    = \OO\logs\OO_UART.log
voice_mode  = 0
debug_level = 1

[llm]
temperature = 0.8
steps       = 256
ctx_size    = 512

[warden]
dplus_threshold = 0.7
thermal_limit   = 85

[self_improve]
lora_rank   = 8
evo_fitness = 75
lora_lba    = 0x800
